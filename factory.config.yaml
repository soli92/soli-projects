# Factory configuration — PATTERN.md §13
# Soli Projects: knowledge base centralizzata cross-progetto (soli92).
# CONFIG (cambia raramente), non stato — lo stato resta derivato dal filesystem + wiki/log.md.

pattern_version: "2.20"
# Upgrade 2026-06-10: v2.11 → v2.19 → v2.20 (delta additivo non distruttivo, factory-upgrade-protocol).
# Tutte le capability v2.13+ sono opt-in, no-op a flag spento: questa factory plan-only
# si comporta identica a v2.11 finché non si accendono i flag sotto.
# v2.20 (FE Functional Oracle EP-018) è una capability frontend: ora ATTIVABILE (topologia
# full-stack-agents con qa-dev/fe-dev) — opt-in via fe_correctness.functional_oracle (default off).
#
# 2026-06-10: topologia plan-only → full-stack-agents. La factory ora sviluppa anche la
# propria app Next.js (code_path "."), oltre a mantenere la KB cross-progetto.

# Topologia: full-stack-agents — la factory non è solo la KB cross-progetto, ma
# sviluppa anche la propria applicazione Next.js (questo repo). I dev-agent (be/fe/db/qa)
# consumano i TSK e producono codice in code_path; il wiki/PM resta il substrato.
topology: full-stack-agents

# L5 attivo: il codice dell'app vive in questo stesso repo (monorepo logico).
# App Router, server actions e lib stanno in app/, lib/, components/ al root.
code_path: "."

# VCS: monorepo (codice e KB nello stesso repo, single-committer soli92 su main).
vcs:
  mode: monorepo
  branch_strategy: direct      # single-committer: commit diretti su main
  commit_coupling: per-task    # un commit per TSK consumato

# Stack dichiarato manualmente (Next.js full-stack unificato).
stack_mode: manual

# Routing: tutti i layer agentici (full-stack-agents). infra resta umano (deploy Vercel).
routing:
  be: agent
  fe: agent
  db: agent
  qa: agent
  infra: human

stack:
  backend: "Next.js 16 server actions / route handlers (TypeScript), @anthropic-ai/sdk"
  frontend: "Next.js 16 App Router, React 19, TypeScript, Tailwind + @soli92/solids"
  database: "Supabase (Postgres, schema pm_*), accesso server-side via service role"
  qa: "Vitest (unit, jsdom), Playwright (E2E Chromium)"
  infra: "Vercel (deploy automatico da main)"

# Adapter registry (v2.13, PATTERN §12). Questa factory ospita l'adapter Cursor
# esistente (.cursor/), ora registrato formalmente in adapters/cursor/manifest.yaml.
adapters:
  - name: cursor
    folder: .cursor
    maturity: full

# Publisher: disabilitato per ora. Attivabile per mirror su GitHub Issues.
kanban_publish:
  provider: none

# Scheduler: domini read-only + develop/plan/design (ora che la topologia produce codice).
# code_path_conflict: strict → niente develop paralleli che toccano lo stesso code_path.
scheduler:
  enabled: true
  max_parallel: 4
  parallel_gate_threshold: 3
  code_path_conflict: strict
  empty_code_path_policy: serial
  domains:
    ingest: true
    develop: true   # full-stack-agents: i dev-agent consumano i TSK
    lint: true
    query: true
    plan: true      # PM può pianificare in parallelo su target distinti
    design: true    # Arch produce ADR/design su target distinti
    publish: false
    sync: true
    premortem: true # v2.16 — /premortem su target distinti in parallelo (no-op finché la skill non è invocata; opt-in totale R.P3)

# ============================================================================
# Capability opt-in introdotte con l'upgrade v2.19 — TUTTE default `false`.
# A flag spento sono no-op: nessun cambio di comportamento rispetto a v2.11.
# ============================================================================

# Compression Layer (v2.14, PATTERN §20). Asse output (Caveman) + asse context (Graphify).
# Per una KB plan-only l'asse output (messaging agent-to-agent nelle wave di ingest/lint)
# è l'unico rilevante; l'asse context richiede code_path → non applicabile qui.
compression:
  output:
    provider: caveman
    enabled: false                 # opt-in R.C6 — accendere solo dopo aver installato caveman
    install_command: "curl -fsSL https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.sh | bash"
    policy_profile: conservative   # conservative | aggressive | custom
    invariants:                    # R.C1 — non overridabili nemmeno in policy_profile custom
      to_user: off
      to_artifact: off
      propagate_resolution: off
    chain_depth_downgrade: true    # R.C3
    chain_depth_threshold: 3
    cross_factory: off             # R.C4
    drift_fallback:
      enabled: true                # R.C5
      markers: [AMBIGUOUS_HANDOFF, REQUEST_CLARIFY]
    audit_trail_for:
      - propagate-resolution
  context:
    provider: none                 # graphify-cloud | graphify-ollama | none — ora attivabile (code_path ".")
    enabled: false                 # R.G6 — opt-in; richiede install graphify
    targets: []                    # es. [{ kind: code_path, name: "." }] quando enabled

# Premortem (v2.16, PATTERN §3 operazione opzionale). Skill .cursor/skills/premortem-protocol/
# + output append-only in management/risk-registry.md. Invocazione sempre esplicita (R.P3,
# nessun auto-trigger). Nessuna nuova invariante §7.
premortem:
  enabled: false                   # opt-in; la skill resta inerte finché non invocata via /premortem

# Analytics Dogfooding (v2.19, EP-013, ADR-039/040/041). Unico delta v2.19 derivabile.
# Auto-misurazione costi via hook SessionEnd. Default off (no-op identico a v2.18).
# Le capability measurement/estimation (EP-009/010) NON sono scaffoldate qui (plan-only).
analytics:
  dogfooding:
    enabled: false
    lock_strategy: flock-advisory
    idempotency_strategy: hash-compound

# Scope cross-progetto: lista dei repository soli92 indicizzati nella KB.
cross_project_repos:
  - soli-agent
  - soli-prof
  - soli-projects
  - soli-platform
  - solids
  - Koollector
  - soli-dome
  - pippify
  - bachelor-party-claudiano
  - casa-mia-fe
  - casa-mia-be
  - soli-dm-fe
  - soli-dm-be
  - llm-wiki-template
  - soli-obsidian-vault
  - soli-multi-agents-factory

notes: |
  Doppia natura: (1) knowledge base centralizzata cross-progetto per i repository
  soli92 (ingest da AGENTS.md/AI_LOG.md/README.md in raw/ → wiki/), e (2) applicazione
  Next.js full-stack (questo repo, code_path ".").
  Topologia full-stack-agents: i dev-agent (be/fe/db/qa) consumano i TSK e producono
  codice in app/, lib/, components/; il wiki/PM resta il substrato di pianificazione.
  VCS monorepo, single-committer soli92 su main. infra (deploy Vercel) resta umano.
